<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Menopause — Google Ads Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --muted: #6b6b67;
    --hint: #9b9b96;
    --radius: 10px;
    --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --teal-bg: #E1F5EE;   --teal-text: #085041;
    --amber-bg: #FAEEDA;  --amber-text: #633806;
    --coral-bg: #FAECE7;  --coral-text: #993C1D;
    --green-bg: #EAF3DE;  --green-text: #27500A;
    --red-bg: #FCEBEB;    --red-text: #A32D2D;
    --blue-bg: #E6F1FB;   --blue-text: #0C447C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 15px; font-weight: 500; }
  #last-updated { font-size: 12px; color: var(--muted); }
  .tabs { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); background: var(--surface); padding: 0 24px; }
  .tab { padding: 10px 18px; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: color 0.15s; white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .page { display: none; padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
  .page.active { display: block; }
  .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; flex-direction: column; gap: 12px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { font-size: 13px; color: var(--muted); }
  .error-box { background: var(--red-bg); color: var(--red-text); border-radius: var(--radius); padding: 16px 20px; font-size: 13px; margin: 20px 0; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--bg); border-radius: 8px; padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .section-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 20px 0 8px; }
  .tbl-wrap { overflow-x: auto; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { font-size: 10px; font-weight: 500; color: var(--muted); padding: 8px 10px; border-bottom: 0.5px solid var(--border); text-align: right; white-space: nowrap; }
  thead th.left { text-align: left; }
  tbody td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); text-align: right; white-space: nowrap; }
  tbody td.left { text-align: left; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  tfoot td { padding: 8px 10px; text-align: right; font-weight: 500; font-size: 12px; border-top: 1px solid var(--border-strong); background: var(--bg); }
  tfoot td.left { text-align: left; }
  .sep-row td { border-top: 1.5px solid var(--border-strong); background: var(--bg); font-weight: 500; padding: 8px 10px; text-align: right; }
  .sep-row td.left { text-align: left; }
  .agg-row td { background: var(--bg); font-weight: 500; padding: 9px 10px; text-align: right; border-bottom: 0.5px solid var(--border); }
  .agg-row td.left { text-align: left; }
  .agg-row.final td { border-top: 1.5px solid var(--border-strong); border-bottom: none; }
  .fh { background: var(--purple-bg); color: var(--purple-text); font-size: 10px; font-weight: 500; }
  .cnvh { background: var(--amber-bg); color: var(--amber-text); font-size: 10px; font-weight: 500; }
  .ch { background: var(--coral-bg); color: var(--coral-text); font-size: 10px; font-weight: 500; }
  .kh { background: var(--teal-bg); color: var(--teal-text); font-size: 10px; font-weight: 500; }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
  .b-search { background: var(--blue-bg); color: var(--blue-text); }
  .b-pmax { background: var(--purple-bg); color: var(--purple-text); }
  .b-new { background: var(--green-bg); color: var(--green-text); }
  .good { color: #3B6D11; }
  .warn { color: #BA7517; }
  .muted-val { color: var(--hint); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  /* Insights */
  .insight-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 12px; }
  .insight-card.c-green { border-left: 3px solid #639922; }
  .insight-card.c-red { border-left: 3px solid #E24B4A; }
  .insight-card.c-amber { border-left: 3px solid #BA7517; }
  .insight-card.c-blue { border-left: 3px solid #378ADD; }
  .card-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .card-detail { font-size: 12px; color: var(--muted); line-height: 1.55; }
  .card-detail strong { font-weight: 500; color: var(--text); }
  .ibadge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  .b-red { background: var(--red-bg); color: var(--red-text); }
  .b-green { background: var(--green-bg); color: var(--green-text); }
  .b-amber { background: var(--amber-bg); color: var(--amber-text); }
  .b-blue { background: var(--blue-bg); color: var(--blue-text); }
  .pacing-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 6px; }
  .pacing-day { text-align: center; }
  .pacing-lbl { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .pacing-bar-wrap { height: 52px; display: flex; align-items: flex-end; justify-content: center; }
  .pacing-bar { width: 26px; border-radius: 3px 3px 0 0; }
  .pacing-spend { font-size: 10px; font-weight: 500; margin-top: 4px; }
  .pacing-delta { font-size: 10px; margin-top: 1px; }
  .bottom-line { background: var(--bg); border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: var(--muted); line-height: 1.6; margin-top: 6px; }
  .bottom-line strong { color: var(--text); font-weight: 500; }
  .divider { height: 0.5px; background: var(--border); margin: 20px 0; }
  .chart-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .chart-inner { position: relative; width: 100%; height: 220px; }
  .chart-legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 11px; color: var(--muted); margin-top: 10px; }
  .chart-legend span { display: flex; align-items: center; gap: 5px; }
  .legend-line { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }
  .note { font-size: 11px; color: var(--hint); margin-top: 8px; }
  @media (max-width: 700px) { .stat-grid { grid-template-columns: repeat(2,1fr); } .pacing-grid { grid-template-columns: repeat(4,1fr); } }
</style>
</head>
<body>

<header>
  <h1>Modern Menopause — Google Ads Dashboard</h1>
  <span id="last-updated">Loading…</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('insights')">💡 Insights</div>
  <div class="tab" onclick="showTab('campaigns')">📊 Campaigns &amp; Time Periods</div>
  <div class="tab" onclick="showTab('funnel')">🌐 Site Funnel</div>
</div>

<!-- ═══════════════ INSIGHTS TAB ═══════════════ -->
<div id="tab-insights" class="page active">
  <div class="loading" id="loading-insights"><div class="spinner"></div><div class="loading-msg">Pulling yesterday's data…</div></div>
  <div id="content-insights" style="display:none"></div>
</div>

<!-- ═══════════════ CAMPAIGNS TAB ═══════════════ -->
<div id="tab-campaigns" class="page">
  <div class="loading" id="loading-campaigns"><div class="spinner"></div><div class="loading-msg">Loading campaign data…</div></div>
  <div id="content-campaigns" style="display:none"></div>
</div>

<!-- ═══════════════ FUNNEL TAB ═══════════════ -->
<div id="tab-funnel" class="page">
  <div class="loading" id="loading-funnel"><div class="spinner"></div><div class="loading-msg">Loading site funnel…</div></div>
  <div id="content-funnel" style="display:none"></div>
</div>

<script>
// ─── TAB NAVIGATION ───────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const tabs = ['insights','campaigns','funnel'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ─── DATE HELPERS ────────────────────────────────────────────────────────────
function yesterday() {
  const d = new Date(); d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
function daysAgo(n) {
  const d = new Date(); d.setDate(d.getDate()-n);
  return d.toISOString().slice(0,10);
}
function fmtDate(iso) {
  const d = new Date(iso+'T12:00:00Z');
  return d.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
}

// ─── ANTHROPIC API CALL ──────────────────────────────────────────────────────
async function callClaude(prompt) {
  const res = await fetch('https://mm-ads-proxy.novel-rahman.workers.dev/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      mcp_servers: [
        { type: 'url', url: 'https://mcp.windsor.ai', name: 'windsor' },
        { type: 'url', url: 'https://mcp.posthog.com/mcp', name: 'posthog' }
      ],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  const results = data.content.filter(b => b.type === 'mcp_tool_result').map(b => {
    try { return JSON.parse(b.content?.[0]?.text || '[]'); } catch { return b.content?.[0]?.text || ''; }
  });
  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
  return { results, text, raw: data };
}

// ─── FORMAT HELPERS ──────────────────────────────────────────────────────────
const fmt$ = v => v != null && v > 0 ? '$'+Math.round(v).toLocaleString() : '—';
const fmtPct = v => v != null && v > 0 ? (v*100).toFixed(1)+'%' : '—';
const fmtNum = v => v != null ? v.toLocaleString() : '—';
const fmtRoas = v => v != null && v > 0 ? (v/100).toFixed(2)+'x' : '—';
const fmtCvr = (conv, clicks) => conv > 0 && clicks > 0 ? (conv/clicks*100).toFixed(2)+'%' : '—';
const fmtCpa = (cost, conv) => conv > 0 ? '$'+Math.round(cost/conv).toLocaleString() : '—';
const fmtR = (a, b) => a > 0 && b > 0 ? (a/b*100).toFixed(1)+'%' : '—';
function colorClass(val, good, warn) {
  if (!val || val === '—') return 'muted-val';
  const n = parseFloat(val.replace(/[$,%x]/g,''));
  if (n <= good) return 'good';
  if (n <= warn) return '';
  return 'warn';
}
function cpaColor(cpa) {
  if (!cpa || cpa === '—') return 'muted-val';
  const n = parseInt(cpa.replace(/[$,]/g,''));
  if (n <= 150) return 'good';
  if (n <= 300) return '';
  return 'warn';
}

// ─── MAIN DATA LOAD ──────────────────────────────────────────────────────────
async function loadDashboard() {
  const yest = yesterday();
  const ago7 = daysAgo(7); const ago14 = daysAgo(14); const ago30 = daysAgo(30);
  document.getElementById('last-updated').textContent = 'Data for ' + fmtDate(yest) + ' · Loaded ' + new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});

  // Run all 3 tabs in parallel
  Promise.all([
    loadCampaigns(yest, ago7, ago14, ago30),
    loadFunnel(ago30, ago14, ago7, yest),
  ]);
}

// ═══════════════════════════════════════════════════════════════════════════════
// REPORT 1 + 2: CAMPAIGNS + TIME PERIODS
// ═══════════════════════════════════════════════════════════════════════════════
async function loadCampaigns(yest, ago7, ago14, ago30) {
  try {
    // Call Claude to pull Windsor data and return structured JSON
    const prompt = `You are a data assistant. Pull Google Ads data for Modern Menopause account 230-778-8239 via Windsor.ai connector "google_ads".

Make these exact Windsor.ai calls and return ONLY a JSON object — no prose, no markdown.

Call 1: yesterday's campaign metrics
  connector: google_ads, accounts: ["230-778-8239"]
  date_from: "${yest}", date_to: "${yest}"
  fields: ["campaign","campaign_type","impressions","clicks","ctr","cpc","cost","search_top_impression_share","roas"]

Call 2: yesterday's purchase conversions
  connector: google_ads, accounts: ["230-778-8239"]
  date_from: "${yest}", date_to: "${yest}"
  fields: ["campaign","conversion_action_name","conversions"]

Call 3: last 7 days daily metrics
  connector: google_ads, accounts: ["230-778-8239"]
  date_from: "${ago7}", date_to: "${yest}"
  fields: ["date","impressions","clicks","ctr","cpc","cost","search_top_impression_share","roas"]

Call 4: last 7 days daily conversions
  connector: google_ads, accounts: ["230-778-8239"]
  date_from: "${ago7}", date_to: "${yest}"
  fields: ["date","conversion_action_name","conversions"]

Call 5: last 14 day totals
  connector: google_ads, accounts: ["230-778-8239"]
  date_from: "${ago14}", date_to: "${yest}"
  fields: ["impressions","clicks","ctr","cpc","cost","search_top_impression_share","roas"]

Call 6: last 14 day conversions
  connector: google_ads, accounts: ["230-778-8239"]
  date_from: "${ago14}", date_to: "${yest}"
  fields: ["conversion_action_name","conversions"]

Call 7: last 30 day totals
  connector: google_ads, accounts: ["230-778-8239"]
  date_from: "${ago30}", date_to: "${yest}"
  fields: ["impressions","clicks","ctr","cpc","cost","search_top_impression_share","roas"]

Call 8: last 30 day conversions
  connector: google_ads, accounts: ["230-778-8239"]
  date_from: "${ago30}", date_to: "${yest}"
  fields: ["conversion_action_name","conversions"]

Also run these PostHog HogQL queries (project at mcp.posthog.com):

PostHog Query A — yesterday campaign funnel:
SELECT properties.utm_campaign AS campaign, event, count() AS cnt
FROM events
WHERE timestamp >= toDate('${yest}') AND timestamp < toDate('${yest}') + INTERVAL 1 DAY
  AND properties.utm_source = 'google_paid'
  AND event IN ('booking_initial_assessment_clicked','booking_form_submitted','booking_payment_completed')
GROUP BY campaign, event LIMIT 100

PostHog Query B — 7 day daily funnel:
SELECT toDate(timestamp) AS day, event, count() AS cnt
FROM events
WHERE timestamp >= toDate('${ago7}') AND timestamp < toDate('${yest}') + INTERVAL 1 DAY
  AND properties.utm_source = 'google_paid'
  AND event IN ('booking_initial_assessment_clicked','booking_form_submitted','booking_payment_completed')
GROUP BY day, event ORDER BY day LIMIT 100

Return ONLY this JSON structure (fill with real data from the calls above):
{
  "campaigns": [{"campaign":"...","type":"...","impr":0,"clicks":0,"cost":0,"top_is":0,"roas":0,"purch":0,"appts":0,"forms":0,"ph_purch":0}],
  "daily": [{"date":"YYYY-MM-DD","impr":0,"clicks":0,"cost":0,"top_is":0,"roas":0,"purch":0,"appts":0,"forms":0,"ph_purch":0}],
  "agg14": {"impr":0,"clicks":0,"cost":0,"top_is":0,"roas":0,"purch":0},
  "agg30": {"impr":0,"clicks":0,"cost":0,"top_is":0,"roas":0,"purch":0}
}
For campaigns: filter conversion rows to conversion_action_name="[gtag] purchase" only. Windsor roas is already multiplied by 100 — keep as-is, the UI will divide by 100.
For agg14/agg30: purch = sum of [gtag] purchase conversions only.`;

    const { text } = await callClaude(prompt);
    let data;
    try {
      const json = text.replace(/```json|```/g,'').trim();
      data = JSON.parse(json);
    } catch(e) {
      throw new Error('Could not parse campaign data: ' + text.slice(0,200));
    }
    renderCampaigns(data, yest);
    // Also use campaign data for insights
    loadInsights(data, yest);
  } catch(e) {
    document.getElementById('loading-campaigns').innerHTML = `<div class="error-box">Error loading campaign data: ${e.message}</div>`;
    document.getElementById('loading-insights').innerHTML = `<div class="error-box">Error loading insights: ${e.message}</div>`;
  }
}

function renderCampaigns(data, yest) {
  const { campaigns, daily, agg14, agg30 } = data;

  // compute 7d totals from daily
  const t7 = daily.reduce((a,d) => ({
    impr: a.impr+d.impr, clicks: a.clicks+d.clicks, cost: a.cost+d.cost,
    purch: a.purch+d.purch, appts: a.appts+d.appts, forms: a.forms+d.forms, ph_purch: a.ph_purch+d.ph_purch
  }), {impr:0,clicks:0,cost:0,purch:0,appts:0,forms:0,ph_purch:0});
  const t7ctr = t7.clicks/t7.impr; const t7cpc = t7.cost/t7.clicks;

  // total yesterday
  const tyest = campaigns.reduce((a,c) => ({cost:a.cost+c.cost,clicks:a.clicks+c.clicks,purch:a.purch+c.purch,impr:a.impr+c.impr}),{cost:0,clicks:0,purch:0,impr:0});

  let html = `
  <div class="stat-grid">
    <div class="stat"><div class="stat-label">Yesterday spend</div><div class="stat-value">${fmt$(tyest.cost)}</div><div class="stat-sub">${fmtDate(yest)}</div></div>
    <div class="stat"><div class="stat-label">Yesterday conv.</div><div class="stat-value">${tyest.purch.toFixed(1)}</div><div class="stat-sub">CPA ${fmtCpa(tyest.cost,tyest.purch)}</div></div>
    <div class="stat"><div class="stat-label">7-day spend</div><div class="stat-value">${fmt$(t7.cost)}</div><div class="stat-sub">CPA ${fmtCpa(t7.cost,t7.purch)}</div></div>
    <div class="stat"><div class="stat-label">30-day CPA</div><div class="stat-value">${fmtCpa(agg30.cost,agg30.purch)}</div><div class="stat-sub">vs $100 target</div></div>
  </div>

  <div class="section-label">Campaign summary — ${fmtDate(yest)}</div>
  <div class="tbl-wrap"><table>
    <thead><tr>
      <th class="left" style="min-width:160px">Campaign</th>
      <th class="left" style="width:52px">Type</th>
      <th>Impr.</th><th>Clicks</th><th>CTR</th><th>CPC</th><th>Cost</th>
      <th class="fh">Appts/Clicks</th><th class="fh">Forms/Appts</th><th class="fh">Purch/Forms</th>
      <th class="cnvh">Conv.</th><th class="ch">CVR</th><th class="kh">Cost/Conv.</th>
      <th>Top IS</th><th>ROAS</th>
    </tr></thead>
    <tbody>`;

  campaigns.sort((a,b)=>b.cost-a.cost).forEach(c => {
    const isNew = ['Search_QC_FR_Clinique_Hormonotherapie_tCPA [NB]','Search_CA_EN_Competitors [NB]','Search_ON_AB_Clinic_tCPA [NB]','Search_CA_EN_Clinic_tCPA [NB]','Search_CA_EN_HRT_Treatments_tCPA [NB]'].some(n => c.campaign.includes(n.split(' ')[0].split('_').slice(0,4).join('_')));
    const typeTag = c.type === 'PERFORMANCE_MAX'
      ? `<span class="badge b-pmax">PMax</span>`
      : `<span class="badge b-search">Search</span>`;
    const newTag = isNew ? ` <span class="badge b-new">✦ new</span>` : '';
    const shortName = c.campaign.replace('Search_','').replace('_tCPA','').replace('_Max_clicks','').replace('_Max_conversion_value','').replace('[NB]','').replace('[Brand]','Brand').trim();
    const topIs = c.top_is > 0 ? (c.top_is*100).toFixed(1)+'%' : 'N/A';
    const cpa = fmtCpa(c.cost, c.purch);
    const cvr = fmtCvr(c.purch, c.clicks);
    html += `<tr>
      <td class="left">${shortName}${newTag}</td>
      <td class="left">${typeTag}</td>
      <td>${(c.impr||0).toLocaleString()}</td>
      <td>${(c.clicks||0).toLocaleString()}</td>
      <td>${c.clicks>0?((c.impr>0?(c.clicks/c.impr*100).toFixed(2):0)+'%'):'—'}</td>
      <td>${c.clicks>0?('$'+(c.cost/c.clicks).toFixed(2)):'—'}</td>
      <td>$${Math.round(c.cost).toLocaleString()}</td>
      <td>${fmtR(c.appts,c.clicks)}</td>
      <td>${fmtR(c.forms,c.appts)}</td>
      <td>${fmtR(c.ph_purch,c.forms)}</td>
      <td class="${c.purch>0?'':'muted-val'}">${c.purch>0?c.purch.toFixed(2):'—'}</td>
      <td class="${c.purch>0&&c.clicks>0?'':''}">${cvr}</td>
      <td class="${cpaColor(cpa)}">${cpa}</td>
      <td class="${c.top_is>0&&c.top_is<0.4?'warn':c.top_is>=0.8?'good':''}">${topIs}</td>
      <td class="${c.roas>0&&c.roas/100>=1.5?'good':c.roas>0&&c.roas/100<1?'warn':''}">${c.roas>0?fmtRoas(c.roas):'—'}</td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td class="left">Total</td><td class="left"></td>
    <td>${tyest.impr.toLocaleString()}</td>

// REPORT 3 + 4: SITE FUNNEL
// ═══════════════════════════════════════════════════════════════════════════════
async function loadFunnel(ago30, ago14, ago7, yest) {
  try {
    const prompt = `You are a data assistant. Run these PostHog HogQL queries and return ONLY a JSON object.

Query A — 30-day channel funnel:
WITH channel_sessions AS (
  SELECT person_id, properties.$session_id AS session_id,
    multiIf(
      properties.utm_source = 'google_paid', 'Google Paid',
      properties.utm_source IN ('fb','facebook') OR properties.utm_medium IN ('Facebook_Mobile_Feed','Facebook_Desktop_Feed'), 'Meta Paid',
      properties.utm_source = 'ig', 'Meta Paid',
      properties.utm_source = 'paid_social_media', 'Meta Paid',
      properties.utm_source = 'bing', 'Bing Paid',
      properties.utm_source = 'chatgpt.com', 'ChatGPT',
      properties.utm_source IS NOT NULL AND properties.utm_source != '', 'Other Paid',
      properties.$referring_domain = '$direct' OR properties.$referring_domain IS NULL, 'Direct',
      properties.$referring_domain LIKE '%google%', 'Organic Search',
      properties.$referring_domain LIKE '%bing%', 'Organic Search',
      properties.$referring_domain LIKE '%yahoo%', 'Organic Search',
      properties.$referring_domain LIKE '%duckduckgo%', 'Organic Search',
      properties.$referring_domain LIKE '%brave%', 'Organic Search',
      properties.$referring_domain LIKE '%facebook%' OR properties.$referring_domain LIKE '%instagram%', 'Organic Social',
      'Referral'
    ) AS channel
  FROM events
  WHERE timestamp >= toDate('${ago30}') AND timestamp < toDate('${yest}') + INTERVAL 1 DAY AND event = '$pageview'
  GROUP BY person_id, session_id, channel
),
funnel_events AS (
  SELECT person_id, properties.$session_id AS session_id,
    countIf(event='booking_initial_assessment_clicked') AS appts,
    countIf(event='booking_form_submitted') AS forms,
    countIf(event='booking_payment_completed') AS purchases
  FROM events
  WHERE timestamp >= toDate('${ago30}') AND timestamp < toDate('${yest}') + INTERVAL 1 DAY
    AND event IN ('booking_initial_assessment_clicked','booking_form_submitted','booking_payment_completed')
  GROUP BY person_id, session_id
)
SELECT cs.channel, count(DISTINCT cs.session_id) AS sessions,
  countIf(fe.appts>0) AS appt_sessions, countIf(fe.forms>0) AS form_sessions,
  countIf(fe.purchases>0) AS purchase_sessions
FROM channel_sessions cs LEFT JOIN funnel_events fe ON cs.person_id=fe.person_id AND cs.session_id=fe.session_id
GROUP BY cs.channel ORDER BY sessions DESC LIMIT 20

Query B — 14-day daily funnel (all channels):
SELECT toDate(timestamp) AS day,
  count(DISTINCT properties.$session_id) AS sessions,
  countIf(event='booking_initial_assessment_clicked') AS appts,
  countIf(event='booking_form_submitted') AS forms,
  countIf(event='booking_payment_completed') AS purchases
FROM events
WHERE timestamp >= toDate('${ago14}') AND timestamp < toDate('${yest}') + INTERVAL 1 DAY
  AND event IN ('$pageview','booking_initial_assessment_clicked','booking_form_submitted','booking_payment_completed')
GROUP BY day ORDER BY day LIMIT 100

Query C — aggregate windows:
SELECT
  countIf(event='$pageview') AS pv,
  countIf(event='booking_initial_assessment_clicked') AS appts,
  countIf(event='booking_form_submitted') AS forms,
  countIf(event='booking_payment_completed') AS purchases,
  count(DISTINCT properties.$session_id) AS sessions
FROM events
WHERE timestamp >= toDate('${yest}') AND timestamp < toDate('${yest}') + INTERVAL 1 DAY
  AND event IN ('$pageview','booking_initial_assessment_clicked','booking_form_submitted','booking_payment_completed')
LIMIT 10

Return ONLY this JSON (no markdown, no prose):
{
  "channels": [{"channel":"...","sessions":0,"appts":0,"forms":0,"purchases":0}],
  "daily14": [{"date":"YYYY-MM-DD","sessions":0,"appts":0,"forms":0,"purchases":0}],
  "yesterday": {"sessions":0,"appts":0,"forms":0,"purchases":0},
  "agg7": {"sessions":0,"appts":0,"forms":0,"purchases":0},
  "agg14": {"sessions":0,"appts":0,"forms":0,"purchases":0},
  "agg30": {"sessions":0,"appts":0,"forms":0,"purchases":0}
}
Compute agg7 and agg30 by summing from daily14 (last 7 and all 14 rows respectively). yesterday = last row of daily14.`;

    const { text } = await callClaude(prompt);
    let data;
    try {
      data = JSON.parse(text.replace(/```json|```/g,'').trim());
    } catch(e) {
      throw new Error('Could not parse funnel data: ' + text.slice(0,200));
    }
    renderFunnel(data, yest);
  } catch(e) {
    document.getElementById('loading-funnel').innerHTML = `<div class="error-box">Error loading funnel data: ${e.message}</div>`;
  }
}

// REPORT 5: INSIGHTS (rule-based from campaign data)
// ═══════════════════════════════════════════════════════════════════════════════
function loadInsights(data, yest) {
  const { campaigns, daily } = data;
  const WEEKDAY_TARGET = 3250, WEEKEND_TARGET = 2000;

  // Pacing
  const pacingDays = daily.map(d => {
    const dow = new Date(d.date+'T12:00:00Z').getDay();
    const isWknd = dow===0||dow===6;
    const target = isWknd ? WEEKEND_TARGET : WEEKDAY_TARGET;
    const delta = d.cost - target;
    const pct = Math.abs(delta)/target;
    const color = delta > target*0.2 ? '#E24B4A' : delta > 0 ? '#EF9F27' : delta < -target*0.3 ? '#B4B2A9' : '#639922';
    const maxSpend = Math.max(...daily.map(x=>x.cost));
    const barH = Math.max(8, Math.round(d.cost/maxSpend*100));
    const deltaStr = delta > 0 ? `<span style="color:${color}">+$${Math.round(delta).toLocaleString()}</span>` : delta < -200 ? `<span style="color:#888">–$${Math.round(-delta).toLocaleString()}</span>` : `<span style="color:#639922">✓</span>`;
    return { ...d, target, delta, color, barH, deltaStr, label: fmtDate(d.date).replace(/\d{4}/,'').trim() };
  });

  const totalActual = daily.reduce((a,d)=>a+d.cost,0);
  const totalTarget = daily.reduce((a,d,i)=>{const dow=new Date(d.date+'T12:00:00Z').getDay();return a+(dow===0||dow===6?WEEKEND_TARGET:WEEKDAY_TARGET);},0);
  const totalDelta = totalActual - totalTarget;

  // Campaign signals
  const totalYestCost = campaigns.reduce((a,c)=>a+c.cost,0);
  const pmax = campaigns.find(c=>c.type==='PERFORMANCE_MAX'&&c.cost>500);
  const brand = campaigns.find(c=>c.campaign.includes('Brand')||c.campaign.includes('Max_clicks'));
  const qcClinik = campaigns.find(c=>c.campaign.includes('Clinique_Hormonotherapie'));
  const hrt = campaigns.find(c=>c.campaign.includes('HRT_Treatments'));
  const qcPortfolio = campaigns.find(c=>c.campaign.includes('Portfolio'));
  const onClinic = campaigns.find(c=>c.campaign.includes('Menopause_clinic'));

  const doubleDown = [];
  const investigate = [];

  // Brand check
  if (brand) {
    const bCpa = brand.purch>0 ? Math.round(brand.cost/brand.purch) : null;
    const bIs = brand.top_is ? (brand.top_is*100).toFixed(0) : null;
    const bRoas = brand.roas>0?(brand.roas/100).toFixed(2):null;
    if (bCpa && bCpa < 150) doubleDown.push({
      color:'c-green', icon:'⭐',
      title: `Brand is your most efficient spend <span class="ibadge b-green">$${bCpa} CPA · ${bRoas}x ROAS</span>`,
      detail: `${bIs}% Top IS${bIs>85?' — nearly maxed out':' — room to protect'}. Only <strong>$${Math.round(brand.cost).toLocaleString()} spend</strong> yesterday. Easiest lever for incremental conversions at lowest cost.`
    });
  }

  // QC Clinique
  if (qcClinik && qcClinik.purch>0) {
    const cpa = Math.round(qcClinik.cost/qcClinik.purch);
    const roas = (qcClinik.roas/100).toFixed(2);
    const is = (qcClinik.top_is*100).toFixed(0);
    if (cpa < 250) doubleDown.push({
      color:'c-green', icon:'📈',
      title: `QC Clinique is your standout new campaign <span class="ibadge b-green">$${cpa} CPA · ${roas}x ROAS</span>`,
      detail: `Top IS at ${is}% — significant room to scale. If CPA holds below $200 through the next few days, this warrants a budget increase. Watch daily.`
    });
  }

  // ON clinic
  if (onClinic && onClinic.purch>0) {
    const cpa = Math.round(onClinic.cost/onClinic.purch);
    if (cpa < 200) doubleDown.push({
      color:'c-blue', icon:'🏥',
      title: `ON Menopause Clinic converting efficiently <span class="ibadge b-blue">$${cpa} CPA</span>`,
      detail: `Strong CVR signal on small volume. Top IS at ${(onClinic.top_is*100).toFixed(0)}% — check if budget is constraining this campaign.`
    });
  }

  // Spend over ceiling
  const yestData = daily[daily.length-1];
  if (yestData) {
    const yDow = new Date(yestData.date+'T12:00:00Z').getDay();
    const yIsWknd = yDow===0||yDow===6;
    const yCeil = yIsWknd ? 2000 : 3500;
    if (yestData.cost > yCeil) {
      const pmaxShare = pmax ? Math.round(pmax.cost/totalYestCost*100) : 0;
      investigate.push({
        color:'c-red', icon:'⚠️',
        title: `Spend $${Math.round(yestData.cost-yCeil).toLocaleString()} over ${yIsWknd?'weekend':'weekday'} ceiling <span class="ibadge b-red">$${Math.round(yestData.cost).toLocaleString()} vs $${yCeil.toLocaleString()} target</span>`,
        detail: `${pmax?`PMax alone spent <strong>$${Math.round(pmax.cost).toLocaleString()} (${pmaxShare}% of budget)</strong> on uncapped Max Conversion Value bidding. `:''}Consider setting a PMax daily budget cap to prevent day-level overruns.`
      });
    }
  }

  // HRT gated
  if (hrt && hrt.cost > 50) {
    investigate.push({
      color:'c-red', icon:'🔒',
      title: `HRT Treatments spending $${Math.round(hrt.cost).toLocaleString()}/day with LP not live until Jul 6 <span class="ibadge b-red">Pause immediately</span>`,
      detail: `This campaign is gated — the /hormone-replacement-therapy landing page is not live until July 6, 2026. Every dollar here is wasted. <strong>Pause or zero the budget now.</strong>`
    });
  }

  // QC Portfolio drain
  if (qcPortfolio && qcPortfolio.purch>0) {
    const cpa = Math.round(qcPortfolio.cost/qcPortfolio.purch);
    if (cpa > 400) investigate.push({
      color:'c-red', icon:'🔥',
      title: `QC FR Portfolio bleeding spend <span class="ibadge b-red">$${cpa} CPA · ${(qcPortfolio.roas/100).toFixed(2)}x ROAS</span>`,
      detail: `<strong>$${cpa} for 1 conversion</strong> yesterday. This is the legacy QC campaign being replaced by QC Clinique ($${qcClinik&&qcClinik.purch>0?Math.round(qcClinik.cost/qcClinik.purch):'-'} CPA). Actively migrate budget as QC Clinique matures.`
    });
  } else if (qcPortfolio && qcPortfolio.purch===0 && qcPortfolio.cost > 200) {
    investigate.push({
      color:'c-amber', icon:'🔥',
      title: `QC FR Portfolio: $${Math.round(qcPortfolio.cost).toLocaleString()} spend, 0 conversions <span class="ibadge b-amber">Budget migration candidate</span>`,
      detail: `Legacy campaign with no conversions yesterday. If QC Clinique continues performing, shift this budget.`
    });
  }

  // New campaigns with no conv and high spend
  campaigns.filter(c=>c.purch===0&&c.cost>200&&!c.campaign.includes('HRT')).forEach(c => {
    const shortN = c.campaign.replace('Search_','').replace('_tCPA','').split(' ')[0];
    investigate.push({
      color:'c-amber', icon:'⏱',
      title: `${shortN} spending $${Math.round(c.cost).toLocaleString()} with 0 conversions <span class="ibadge b-amber">Learning phase</span>`,
      detail: `Top IS ${c.top_is>0?(c.top_is*100).toFixed(0)+'%':'N/A'}. New campaign still in learning window — expected for first 7–14 days. Monitor appt click rate in PostHog for early quality signal.`
    });
  });

  const yesterday7dCpa = daily.length>0 ? Math.round(daily.reduce((a,d)=>a+d.cost,0)/daily.reduce((a,d)=>a+d.purch,0)) : null;

  // Build bottom line
  const topIssue = hrt && hrt.cost > 50 ? 'Pause HRT Treatments immediately (LP gated until Jul 6)' :
    investigate.find(i=>i.color==='c-red') ? investigate.find(i=>i.color==='c-red').title.replace(/<[^>]+>/g,'').trim() :
    'Review PMax daily spend to stay within budget ceiling';

  let insightsHtml = `
  <div class="section-label">Spend pacing — last 7 days</div>
  <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;">
    <div class="pacing-grid">
      ${pacingDays.map(d=>`
      <div class="pacing-day">
        <div class="pacing-lbl">${d.label.split(',')[0]}</div>
        <div class="pacing-bar-wrap"><div class="pacing-bar" style="height:${d.barH}%;background:${d.color}"></div></div>
        <div class="pacing-spend">$${Math.round(d.cost/1000).toFixed(1)}k</div>
        <div class="pacing-delta">${d.deltaStr}</div>
      </div>`).join('')}
    </div>
    <div style="font-size:11px;color:var(--hint);margin-top:8px;">
      7d actual: <strong style="color:var(--text)">$${Math.round(totalActual).toLocaleString()}</strong> vs target $${Math.round(totalTarget).toLocaleString()} 
      <span style="color:${totalDelta>0?'#BA7517':'#3B6D11'}">${totalDelta>0?'+':''} $${Math.round(totalDelta).toLocaleString()}</span> · 
      Green = on target · Amber/Red = over · Grey = under
    </div>
  </div>

  <div class="divider"></div>
  <div class="section-label">Double down</div>
  ${doubleDown.map(c=>`
  <div class="insight-card ${c.color}">
    <div class="card-icon">${c.icon}</div>
    <div class="card-body">
      <div class="card-title">${c.title}</div>
      <div class="card-detail">${c.detail}</div>
    </div>
  </div>`).join('')}
  ${doubleDown.length===0?'<div style="font-size:12px;color:var(--hint);padding:8px 0;">No strong scale signals today — check back after learning campaigns mature.</div>':''}

  <div class="divider"></div>
  <div class="section-label">Investigate</div>
  ${investigate.map(c=>`
  <div class="insight-card ${c.color}">
    <div class="card-icon">${c.icon}</div>
    <div class="card-body">
      <div class="card-title">${c.title}</div>
      <div class="card-detail">${c.detail}</div>
    </div>
  </div>`).join('')}
  ${investigate.length===0?'<div style="font-size:12px;color:var(--hint);padding:8px 0;">No issues flagged today. 👌</div>':''}

  <div class="divider"></div>
  <div class="bottom-line">
    <strong>Bottom line:</strong> ${topIssue}. 
    7-day CPA is <strong>$${yesterday7dCpa||'—'}</strong> vs the 30-day baseline — 
    ${yesterday7dCpa&&yesterday7dCpa<200?'trending well as new campaigns mature.':yesterday7dCpa&&yesterday7dCpa>250?'elevated while new campaigns are in learning phase; expect improvement over next 7–10 days.':'monitor daily as new campaigns stabilize.'}
  </div>`;

  document.getElementById('loading-insights').style.display = 'none';
  document.getElementById('content-insights').innerHTML = insightsHtml;
  document.getElementById('content-insights').style.display = 'block';
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
loadDashboard();
</script>
</body>
</html>
